name: sonerler_academy
description: "SONERLER Academy - Yapay zeka destekli kişisel fitness koçu uygulaması"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_messaging: ^15.1.5
  cloud_functions: ^5.1.5

  # Auth Providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Ads
  google_mobile_ads: ^5.2.0

  # In-App Purchase
  in_app_purchase: ^3.2.1

  # Charts
  fl_chart: ^0.69.2

  # Media
  video_player: ^2.9.2
  cached_network_image: ^3.4.1

  # UI / Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  flutter_svg: ^2.0.16
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # fonts:
  #   - family: Manrope
  #     fonts:
  #       - asset: assets/fonts/Manrope-Regular.ttf
  #       - asset: assets/fonts/Manrope-Bold.ttf
  #         weight: 700